<div class="container">
    <h2>Foundation Office</h2>
    <p> Location 1: Gqeberha, Eastern Cape</p>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3315.584533265518!2d25.585894975070392!3d-33.79722551535416!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e7b2a3926a0f07d%3A0x160f000245f3ba0e!2sNxanelwimfundo%20Intermediate%20School!5e0!3m2!1sen!2sza!4v1775823165174!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>


    <h2>Email</h2>
    <p>info@hlumisfoundation.org</p>

    <h2>Phone</h2>
            <p>+27603724794</p>

            <form id="contactForm" novalidate style="margin-top: 30px;">
                <div>
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. 0821234567" required>
                </div>

                <div>
                    <label for="message">Message Content:</label>
                    <textarea id="message" name="message" rows="6" placeholder="Type your message here..." required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
