<header>
    <h1>Contact Our Academy Team</h1>
    <p>Get in touch with us directly for any immediate institution inquiries.</p>
</header>

<div class="container">
    <h2>Reach Out to Us</h2>
    
    <form id="contactForm">
        <div>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name">
        </div>
        
        <div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email">
        </div>
        
        <div>
            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone" placeholder="e.g. 081 234 5678">
        </div>
        
        <div>
            <label for="message">Message Content:</label>
            <textarea id="message" name="message" rows="6" placeholder="Type your message here..."></textarea>
        </div>
        
        <button type="submit">Send Message</button>
    </form>
</div>

<div id="imageLightboxModal" style="display: none; position: fixed; inset: 0; background: rgba(11, 79, 44, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 99999; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);">
    <span id="closeLightbox" style="position: absolute; top: 30px; right: 40px; color: rgba(255, 255, 255, 0.8); font-size: 45px; font-family: Arial, sans-serif; font-weight: 300; cursor: pointer; transition: color 0.3s ease; user-select: none;">&times;</span>
    <img id="enlargedLightboxImage" style="max-width: 85%; max-height: 80vh; object-fit: contain; border: 3px solid #d6af37; border-radius: 16px; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6); transform: scale(0.92); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);" src="" alt="Enlarged View Layer">
</div>
